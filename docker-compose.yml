version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: smartasset
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./smart_asset
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smartasset
      - DEBUG=False
    depends_on:
      - db

  frontend:
    build: ./asset-dashboard

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  pgdata: