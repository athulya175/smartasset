<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Assets</h1>

<a href="/assets/add/">Add Asset</a>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Serial Number</th>
        <th>Type</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>

    {% for asset in assets %}
    <tr>
        <td>{{ asset.name }}</td>
        <td>{{ asset.serial_number }}</td>
        <td>{{ asset.asset_type }}</td>
        <td>{{ asset.status }}</td>
        <td>
            <a href="/assets/edit/{{ asset.id }}/">Edit</a>
            <a href="/assets/delete/{{ asset.id }}/">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>
</body>
</html>
